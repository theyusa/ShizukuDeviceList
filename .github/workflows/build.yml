name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create debug keystore
        run: |
          keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Create gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties

      - name: Create app signing config
        run: |
          cat > app/signing.properties << EOF
          storeFile=debug.keystore
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF

      - name: Build debug APK (ARM64 v8)
        run: |
          ./gradlew assembleDebug \
            -Pandroid.arch=arm64-v8a \
            -PsigningConfig=debug

      - name: Build release APK (ARM64 v8)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.arch=arm64-v8a \
            -PsigningConfig=debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-arm64-v8
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-arm64-v8
          path: app/build/outputs/apk/release/*.apk