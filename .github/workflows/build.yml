name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Determine version
        id: version
        run: |
          # Check if this is a workflow_dispatch (manual trigger)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # For manual trigger, use existing version from build.gradle.kts
            CURRENT=$(grep "versionName" app/build.gradle.kts | sed 's/versionName = "//' | sed 's/"//')
            echo "Manual trigger - using existing version: $CURRENT"
            NEW_VERSION=$(echo $CURRENT | sed 's/v//')
          else
            # Get last version tag, default to v1.0.0 if none exists
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            echo "Last tag: $LAST_TAG"

            VER_NUM=$(echo $LAST_TAG | sed 's/v//')
            echo "Current version: $VER_NUM"

            IFS='.' read -ra VER <<< "$VER_NUM"
            MAJOR=${VER[0]:-1}
            MINOR=${VER[1]:-0}
            PATCH=${VER[2]:-0}

            PATCH=$((PATCH + 1))

            if [ $PATCH -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
              if [ $MINOR -ge 10 ]; then
                MINOR=0
                MAJOR=$((MAJOR + 1))
              fi
            fi

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          echo "New version: $NEW_VERSION"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"v${{ steps.version.outputs.VERSION }}\"/" app/build.gradle.kts

      - name: Create git tag and commit
        if: github.event_name != 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGES=$(git status --porcelain)
          if [ -z "$CHANGES" ]; then
            echo "No changes to commit, skipping"
            exit 0
          fi
          git add -A
          git commit -m "Version bump to v${{ steps.version.outputs.VERSION }}"
          # Delete existing tag if exists
          git tag -d v${{ steps.version.outputs.VERSION }} 2>/dev/null || true
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin main --tags || echo "Push failed"

      - name: Create debug keystore
        run: |
          mkdir -p app/keystore
          keytool -genkeypair -v -keystore app/keystore/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Create gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties

      - name: Build release APK (ARM64-v8)
        run: |
          ./gradlew assembleRelease --stacktrace

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          tag_name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}