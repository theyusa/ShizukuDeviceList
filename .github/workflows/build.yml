name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Determine next version
        id: version
        run: |
          # Get last version tag, default to v1.0.0 if none exists
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Last tag: $LAST_TAG"
          
          # Extract version number without 'v'
          VER_NUM=$(echo $LAST_TAG | sed 's/v//')
          echo "Current version: $VER_NUM"
          
          # Split into parts
          IFS='.' read -ra VER <<< "$VER_NUM"
          MAJOR=${VER[0]:-1}
          MINOR=${VER[1]:-0}
          PATCH=${VER[2]:-0}
          
          # Increment patch
          PATCH=$((PATCH + 1))
          
          # If patch reaches 10, reset to 0 and increment minor
          if [ $PATCH -ge 10 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
            if [ $MINOR -ge 10 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"v${{ steps.version.outputs.VERSION }}\"/" app/build.gradle.kts
          echo "Updated app/build.gradle.kts"

      - name: Show current version
        run: |
          grep "versionName" app/build.gradle.kts

      - name: Create git tag and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Version bump to v${{ steps.version.outputs.VERSION }}"
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin main --tags || echo "Push failed, continuing..."

      - name: Create debug keystore
        run: |
          mkdir -p app/keystore
          keytool -genkeypair -v -keystore app/keystore/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Create gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties

      - name: Build debug APK (ARM64-v8)
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Build release APK (ARM64-v8)
        run: |
          ./gradlew assembleRelease --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-device-list-v${{ steps.version.outputs.VERSION }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk